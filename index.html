<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Pro v8.1.0</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --accent: #38bdf8; --success: #10b981; --border: #334155;
            --warning: #f59e0b;
            --row-red: #fca5a5; --row-yellow: #fde047; --row-green: #86efac; --row-blue: #93c5fd;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 950px; margin: 0 auto; padding-bottom: 120px; }
        
        /* Layout Elements */
        header { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .setup-bar { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        .team-block { background: var(--card); border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); padding: 15px; }
        .angler-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { background: var(--bg); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 16px; outline: none; }

        /* Navigation Buttons */
        .controls { position: fixed; bottom: 15px; left: 15px; right: 15px; display: flex; gap: 10px; z-index: 100; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-main { background: var(--success); color: white; padding: 20px; flex: 2; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .btn-edit { background: var(--warning); color: white; padding: 10px 20px; margin-bottom: 15px; width: 100%; display: block; }
        .btn-reset { background: transparent; color: #ef4444; border: 1px solid #ef4444; padding: 5px 10px; font-size: 10px; }

        /* Result Styles */
        .res-block { background: white; color: #1e293b; border-radius: 8px; margin-bottom: 15px; padding: 15px; }
        .change-tag { background: var(--warning); color: white; font-size: 9px; padding: 2px 5px; border-radius: 3px; margin-left: 8px; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 10px 8px; text-align: left; border-bottom: 1px solid #eee; }
        
        .row-red { background-color: var(--row-red) !important; }
        .row-yellow { background-color: var(--row-yellow) !important; }
        .row-green { background-color: var(--row-green) !important; }
        .row-blue { background-color: var(--row-blue) !important; }

        @media print { .no-print, .controls, .btn-edit { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <header class="no-print">
        <h1>MATCH PRO <small style="font-size: 0.7rem; color: var(--accent);">v8.1.0</small></h1>
        <button class="btn-reset" onclick="resetApp()">Full Reset</button>
    </header>

    <div class="no-print" id="entrySection">
        <div class="setup-bar">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <div><label style="font-size: 9px; color: var(--accent);">ZONES</label><input type="number" id="numZones" value="4"></div>
                <div><label style="font-size: 9px; color: var(--accent);">TEAMS</label><input type="number" id="numTeams" value="24"></div>
                <div><label style="font-size: 9px; color: var(--accent);">INDIVS</label><input type="number" id="numIndivs" value="2"></div>
            </div>
            <button style="background: var(--accent); color: var(--bg); width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px;" onclick="initGrid()">Update Grid Layout</button>
        </div>
        <div id="entryContainer"></div>
    </div>

    <div id="resultsSection" style="display: none;">
        <button class="btn-edit no-print" onclick="showEntry()">← AMEND ENTRY LIST (Add/Swap Anglers)</button>
        <div id="resultsArea"></div>
    </div>

    <div class="controls no-print" id="footerControls">
        <button class="btn-main" id="drawBtn" onclick="runDraw()">PROCESS MATCH DRAW</button>
    </div>
</div>

<script>
    const zones = ['Red', 'Yellow', 'Green', 'Blue', 'Orange', 'Purple', 'Silver', 'Gold'];
    let lastResult = null;

    window.onload = () => {
        const saved = localStorage.getItem('matchpro_v810_save');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('numZones').value = data.z;
            document.getElementById('numTeams').value = data.t;
            document.getElementById('numIndivs').value = data.i;
            initGrid(true);
        }
    };

    function saveState() {
        const data = {
            z: document.getElementById('numZones').value,
            t: document.getElementById('numTeams').value,
            i: document.getElementById('numIndivs').value,
            names: Array.from(document.querySelectorAll('.a-name, .t-name, .i-name')).map(el => el.value)
        };
        localStorage.setItem('matchpro_v810_save', JSON.stringify(data));
    }

    function initGrid(isAuto = false) {
        const nTeams = parseInt(document.getElementById('numTeams').value) || 0;
        const nIndivs = parseInt(document.getElementById('numIndivs').value) || 0;
        const container = document.getElementById('entryContainer');
        let savedNames = isAuto ? JSON.parse(localStorage.getItem('matchpro_v810_save')).names : [];
        container.innerHTML = ''; let idx = 0;

        for (let i = 1; i <= nTeams; i++) {
            const div = document.createElement('div'); div.className = 'team-block';
            div.innerHTML = `<div style="display:flex; gap:10px; margin-bottom:10px;">
                <span style="background:var(--accent); color:var(--bg); padding:2px 8px; border-radius:4px; font-weight:bold;">${i}</span>
                <input type="text" class="t-name" placeholder="Team Name" value="${savedNames[idx++] || ""}" oninput="saveState()">
                </div>
                <div class="angler-grid">${[1,2,3,4].map(() => `<input type="text" class="a-name" placeholder="Angler" value="${savedNames[idx++] || ""}" oninput="saveState()">`).join('')}</div>`;
            container.appendChild(div);
        }
        if(nIndivs > 0) {
            const iDiv = document.createElement('div'); iDiv.className = 'team-block';
            iDiv.innerHTML = `<div style="margin-bottom:10px; font-weight:bold;">Individuals</div><div class="angler-grid" id="indivGrid"></div>`;
            container.appendChild(iDiv);
            const grid = iDiv.querySelector('#indivGrid');
            for(let j=0; j<nIndivs; j++) grid.innerHTML += `<input type="text" class="i-name" placeholder="Name" value="${savedNames[idx++] || ""}" oninput="saveState()">`;
        }
        saveState();
    }

    function runDraw() {
        const nZones = parseInt(document.getElementById('numZones').value) || 1;
        let teams = {}; let indivs = [];

        document.querySelectorAll('.team-block').forEach(block => {
            const tIn = block.querySelector('.t-name');
            if (tIn && tIn.value.trim()) {
                const teamName = tIn.value.trim();
                const names = Array.from(block.querySelectorAll('.a-name')).map(i => i.value.trim()).filter(v => v !== "");
                if (names.length) teams[teamName] = names.map(n => ({ name: n, team: teamName, hasChanged: false }));
            }
        });

        document.querySelectorAll('.i-name').forEach(input => {
            if (input.value.trim()) indivs.push({ name: input.value.trim(), team: 'Individual', hasChanged: false });
        });

        const all = [].concat(...Object.values(teams), indivs);
        if (all.length === 0) return alert("Please enter angler names.");

        // Draw Math
        const cap = Math.ceil(all.length / nZones);
        let u1 = new Set(), u2 = new Set();

        Object.keys(teams).forEach(t => {
            let zs = [...Array(nZones).keys()].sort(() => Math.random() - 0.5);
            teams[t].forEach((a, i) => {
                const z = zs[i % nZones];
                a.z1 = z; a.p1 = getP(z, cap, u1);
                a.z2 = (z + 1) % nZones; a.p2 = getP(a.z2, cap, u2);
            });
        });

        indivs.forEach(a => {
            const z = Math.floor(Math.random() * nZones);
            a.z1 = z; a.p1 = getP(z, cap, u1);
            a.z2 = (z + 1) % nZones; a.p2 = getP(a.z2, cap, u2);
        });

        // Track Changes
        if(lastResult) {
            all.forEach(a => {
                const old = lastResult.find(o => o.name === a.name);
                if(old && (old.p1 !== a.p1)) a.hasChanged = true;
            });
        }
        lastResult = JSON.parse(JSON.stringify(all));

        renderResults(teams, indivs);
        document.getElementById('entrySection').style.display = 'none';
        document.getElementById('resultsSection').style.display = 'block';
        document.getElementById('drawBtn').innerText = "RE-CALCULATE DRAW";
        window.scrollTo(0,0);
    }

    function getP(z, s, u) {
        let p, att = 0;
        do { p = (z * s) + Math.floor(Math.random() * s) + 1; att++; } while (u.has(p) && att < 1000);
        u.add(p); return p;
    }

    function renderResults(teams, indivs) {
        let html = `<h2>Match Results</h2>`;
        const build = (data, title) => `
            <div class="res-block">
                <h3 style="margin:0 0 10px 0;">${title}</h3>
                <table>
                    <thead><tr><th>Angler</th><th>Day 1</th><th>Day 2</th></tr></thead>
                    <tbody>${data.map(a => `<tr>
                        <td><strong>${a.name}</strong>${a.hasChanged ? '<span class="change-tag">CHANGED</span>' : ''}</td>
                        <td class="row-${zones[a.z1].toLowerCase()}">${zones[a.z1]} (${a.p1})</td>
                        <td class="row-${zones[a.z2].toLowerCase()}">${zones[a.z2]} (${a.p2})</td>
                    </tr>`).join('')}</tbody>
                </table>
            </div>`;

        Object.keys(teams).forEach(t => html += build(teams[t], "Team: " + t));
        if(indivs.length) html += build(indivs, "Individuals");
        document.getElementById('resultsArea').innerHTML = html;
    }

    function showEntry() {
        document.getElementById('entrySection').style.display = 'block';
        document.getElementById('resultsSection').style.display = 'none';
        document.getElementById('drawBtn').innerText = "UPDATE DRAW WITH CHANGES";
    }

    function resetApp() {
        if(confirm("DANGER: WIPE ALL DATA?")) {
            localStorage.removeItem('matchpro_v810_save');
            location.reload();
        }
    }
</script>
</body>
</html>
