<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishing Match Manager v7.8.0</title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --success: #27ae60;
            --light: #f8f9fa; --border: #dcdde1;
        }
        body { font-family: -apple-system, sans-serif; background: #edf2f7; color: var(--primary); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .setup-box { background: var(--light); padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; display: flex; gap: 20px; align-items: flex-end; }
        .setup-box div { flex: 1; }
        .setup-box label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        .setup-box input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; }
        
        .grid-container { overflow-x: auto; margin-bottom: 20px; border: 1px solid var(--border); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; font-size: 0.8rem; }
        
        .team-row { background: #fff; }
        .indiv-row { background: #fdf1ff; }
        .input-cell { width: 100%; padding: 8px; border: 1px solid #eee; border-radius: 4px; outline: none; box-sizing: border-box; }
        .input-cell:focus { border-color: var(--accent); background: #fff; }
        
        .controls { margin: 20px 0; display: flex; gap: 10px; }
        button { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-setup { background: var(--accent); color: white; }
        .btn-draw { background: var(--success); color: white; flex-grow: 1; font-size: 1.1rem; }
        .btn-print { background: #e67e22; color: white; font-size: 1.1rem; }

        /* Result Styles */
        .result-block { margin-top: 30px; border: 2px solid var(--primary); border-radius: 8px; overflow: hidden; }
        .result-header { background: var(--primary); color: white; padding: 10px; font-weight: bold; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; width: 100%; max-width: 100%; }
            table { font-size: 11px; }
            .result-block { page-break-inside: avoid; border: 1px solid #000; }
            .print-only { display: block !important; }
        }
        .print-only { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="print-only">
        <h1>Match Draw Sheet</h1>
        <p id="printTimestamp"></p>
    </div>

    <header class="no-print">
        <h1>Match Manager v7.8.0</h1>
        <p>Consolidated Team Entry System</p>
    </header>

    <div class="no-print">
        <div class="setup-box">
            <div><label>Number of Zones</label><input type="number" id="numZones" value="4"></div>
            <div><label>Number of Teams</label><input type="number" id="numTeams" value="24"></div>
            <div><label>Individuals</label><input type="number" id="numIndivs" value="2"></div>
            <button class="btn-setup" onclick="initializeGrid()">Generate Entry Form</button>
        </div>

        <div class="grid-container" id="gridWrapper" style="display:none;">
            <table>
                <thead>
                    <tr>
                        <th width="15%">Team Name</th>
                        <th width="20%">Angler 1</th>
                        <th width="20%">Angler 2</th>
                        <th width="20%">Angler 3</th>
                        <th width="20%">Angler 4</th>
                    </tr>
                </thead>
                <tbody id="teamBody"></tbody>
            </table>
            <table style="margin-top:10px;">
                <thead>
                    <tr><th width="15%">Individuals</th><th width="85%">Angler Name</th></tr>
                </thead>
                <tbody id="indivBody"></tbody>
            </table>
        </div>

        <div class="controls" id="drawControls" style="display:none;">
            <button class="btn-draw" onclick="processDraw()">PROCESS MATCH DRAW</button>
            <button class="btn-print" id="printBtn" style="display:none;" onclick="window.print()">PRINT HARD COPY</button>
        </div>
    </div>

    <div id="resultsArea"></div>
</div>

<script>
    const zoneNames = ['Red', 'Yellow', 'Green', 'Blue', 'Orange', 'Purple'];

    function initializeGrid() {
        const nTeams = parseInt(document.getElementById('numTeams').value);
        const nIndivs = parseInt(document.getElementById('numIndivs').value);
        
        const tBody = document.getElementById('teamBody');
        const iBody = document.getElementById('indivBody');
        tBody.innerHTML = ''; iBody.innerHTML = '';

        for (let t = 1; t <= nTeams; t++) {
            const tr = document.createElement('tr');
            tr.className = 'team-row';
            tr.innerHTML = `
                <td><input type="text" class="t-name input-cell" placeholder="Team ${t}"></td>
                <td><input type="text" class="a-name input-cell" placeholder="Name"></td>
                <td><input type="text" class="a-name input-cell" placeholder="Name"></td>
                <td><input type="text" class="a-name input-cell" placeholder="Name"></td>
                <td><input type="text" class="a-name input-cell" placeholder="Name"></td>
            `;
            tBody.appendChild(tr);
        }

        for (let i = 1; i <= nIndivs; i++) {
            const tr = document.createElement('tr');
            tr.className = 'indiv-row';
            tr.innerHTML = `<td>Indiv ${i}</td><td><input type="text" class="i-name input-cell" placeholder="Angler Name"></td>`;
            iBody.appendChild(tr);
        }

        document.getElementById('gridWrapper').style.display = 'block';
        document.getElementById('drawControls').style.display = 'flex';
    }

    function processDraw() {
        const nZones = parseInt(document.getElementById('numZones').value);
        let finalAnglers = [];
        let teamGroups = {};

        // Collect Teams
        document.querySelectorAll('.team-row').forEach(row => {
            const tName = row.querySelector('.t-name').value || "Unnamed Team";
            const names = Array.from(row.querySelectorAll('.a-name')).map(i => i.value.trim()).filter(n => n !== "");
            if (names.length > 0) {
                teamGroups[tName] = names.map(name => ({ name, team: tName }));
            }
        });

        // Collect Individuals
        let individuals = Array.from(document.querySelectorAll('.i-name'))
            .map(i => i.value.trim())
            .filter(n => n !== "")
            .map(name => ({ name, team: "Individual" }));

        const allCount = [].concat(...Object.values(teamGroups), individuals).length;
        const zoneSize = Math.ceil(allCount / nZones);
        let usedD1 = new Set(), usedD2 = new Set();

        // Team Allocation (1 per zone)
        Object.keys(teamGroups).forEach(tName => {
            let zones = Array.from({length: nZones}, (_, i) => i).sort(() => Math.random() - 0.5);
            teamGroups[tName].forEach((angler, i) => {
                const z = zones[i % nZones];
                angler.d1z = z; angler.d1p = getPeg(z, zoneSize, usedD1);
                angler.d2z = (z + 1) % nZones; angler.d2p = getPeg(angler.d2z, zoneSize, usedD2);
            });
        });

        // Individual Allocation
        individuals.forEach(angler => {
            const z = Math.floor(Math.random() * nZones);
            angler.d1z = z; angler.d1p = getPeg(z, zoneSize, usedD1);
            angler.d2z = (z + 1) % nZones; angler.d2p = getPeg(angler.d2z, zoneSize, usedD2);
        });

        renderGroupedResults(teamGroups, individuals);
    }

    function getPeg(z, size, used) {
        let p, attempts = 0;
        do { p = (z * size) + Math.floor(Math.random() * size) + 1; attempts++; } 
        while (used.has(p) && attempts < 2000);
        used.add(p); return p;
    }

    function renderGroupedResults(teams, indivs) {
        let html = `<h2>Match Results - Grouped by Team</h2>`;
        
        Object.keys(teams).forEach(tName => {
            html += `
            <div class="result-block">
                <div class="result-header">TEAM: ${tName}</div>
                <table>
                    <thead><tr><th width="40%">Angler</th><th width="30%">Day 1</th><th width="30%">Day 2</th></tr></thead>
                    <tbody>${teams[tName].map(a => `<tr><td>${a.name}</td><td>${zoneNames[a.d1z]} - Peg ${a.d1p}</td><td>${zoneNames[a.d2z]} - Peg ${a.d2p}</td></tr>`).join('')}</tbody>
                </table>
            </div>`;
        });

        if (indivs.length > 0) {
            html += `
            <div class="result-block">
                <div class="result-header">INDIVIDUAL COMPETITORS</div>
                <table>
                    <thead><tr><th width="40%">Angler</th><th width="30%">Day 1</th><th width="30%">Day 2</th></tr></thead>
                    <tbody>${indivs.map(a => `<tr><td>${a.name}</td><td>${zoneNames[a.d1z]} - Peg ${a.d1p}</td><td>${zoneNames[a.d2z]} - Peg ${a.d2p}</td></tr>`).join('')}</tbody>
                </table>
            </div>`;
        }

        document.getElementById('resultsArea').innerHTML = html;
        document.getElementById('printBtn').style.display = 'block';
        document.getElementById('printTimestamp').innerText = "Generated: " + new Date().toLocaleString();
    }
</script>
</body>
</html>
