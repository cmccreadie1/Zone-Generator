<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Pro v8.0.0</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --accent: #38bdf8; --success: #10b981; --border: #334155;
            --row-red: #fca5a5; --row-yellow: #fde047; --row-green: #86efac; --row-blue: #93c5fd;
            --row-orange: #ffb347; --row-purple: #b39ddb; --row-silver: #cfd8dc; --row-gold: #ffe082;
            --changed: #f59e0b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 950px; margin: 0 auto; padding-bottom: 120px; }
        
        #fairnessOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .popup { background: var(--card); border: 2px solid var(--accent); border-radius: 12px; padding: 30px; max-width: 550px; }
        .close-btn { background: var(--accent); color: var(--bg); border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 20px; cursor: pointer; }

        header { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .setup-bar { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .input-group label { display: block; font-size: 10px; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
        input { background: var(--bg); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 16px; outline: none; }

        .team-block { background: var(--card); border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); padding: 15px; transition: 0.3s; }
        .team-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .team-num { background: var(--accent); color: var(--bg); padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .angler-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .beach-map { background: #e2e8f0; color: #1e293b; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 5px; flex-wrap: wrap; }
        .beach-zone { flex: 1; min-width: 100px; padding: 10px; border-radius: 4px; text-align: center; border: 1px solid rgba(0,0,0,0.1); }
        .beach-label { font-size: 10px; font-weight: bold; display: block; text-transform: uppercase; }
        .beach-range { font-size: 16px; font-weight: 800; display: block; }

        .controls { position: fixed; bottom: 15px; left: 15px; right: 15px; display: flex; gap: 10px; z-index: 100; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: 600; }
        .btn-init { background: var(--accent); color: var(--bg); padding: 12px; width: 100%; margin-top: 10px; }
        .btn-draw { background: var(--success); color: white; padding: 18px; flex: 2; font-size: 1.1rem; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .btn-secondary { background: #64748b; color: white; padding: 18px; flex: 1; }

        .res-block { background: white; color: #1e293b; border-radius: 8px; margin-bottom: 15px; padding: 15px; }
        .change-badge { background: var(--changed); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 10px; vertical-align: middle; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 10px 8px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.1); }
        
        .row-red { background-color: var(--row-red) !important; }
        .row-yellow { background-color: var(--row-yellow) !important; }
        .row-green { background-color: var(--row-green) !important; }
        .row-blue { background-color: var(--row-blue) !important; }
        .row-orange { background-color: var(--row-orange) !important; }
        .row-purple { background-color: var(--row-purple) !important; }
        .row-silver { background-color: var(--row-silver) !important; }
        .row-gold { background-color: var(--row-gold) !important; }

        @media print {
            .no-print, #fairnessOverlay, .controls { display: none !important; }
            body { background: white; color: black; padding: 0; }
            .res-block { page-break-inside: avoid; border: 1px solid #ddd; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

<div id="fairnessOverlay">
    <div class="popup">
        <h2>Match Pro v8.0.0</h2>
        <p>Live Edit & Delta Tracking Enabled.</p>
        <button class="close-btn" onclick="document.getElementById('fairnessOverlay').style.display='none'">Manage Competition</button>
    </div>
</div>

<div class="container">
    <header class="no-print">
        <h1>MATCH PRO <small style="font-size: 0.7rem; color: var(--accent);">v8.0.0</small></h1>
        <button style="background:transparent; color:#ef4444; border:1px solid #ef4444; padding:5px 10px; font-size:10px;" onclick="resetApp(true)">Reset Match</button>
    </header>

    <div class="no-print" id="setupSection">
        <div class="setup-bar">
            <div class="setup-grid">
                <div class="input-group"><label>Zones</label><input type="number" id="numZones" value="4" onchange="saveState()"></div>
                <div class="input-group"><label>Teams</label><input type="number" id="numTeams" value="24" onchange="saveState()"></div>
                <div class="input-group"><label>Indivs</label><input type="number" id="numIndivs" value="2" onchange="saveState()"></div>
            </div>
            <button class="btn-init" onclick="initGrid()">Update Grid</button>
        </div>
        <div id="entryContainer"></div>
    </div>

    <div id="resultsArea"></div>

    <div class="controls no-print" id="mainControls" style="display:none;">
        <button class="btn-draw" onclick="runDraw()">PROCESS DRAW</button>
    </div>

    <div class="controls no-print" id="postDrawControls" style="display:none;">
        <button class="btn-secondary" onclick="closeResults()">Back/Amend</button>
        <button class="btn-draw" onclick="runDraw(true)">Re-Shuffle All</button>
        <button class="btn-secondary" style="background:#f59e0b" onclick="window.print()">Print</button>
    </div>
</div>

<script>
    const zones = ['Red', 'Yellow', 'Green', 'Blue', 'Orange', 'Purple', 'Silver', 'Gold'];
    let isAtResults = false;
    let lastDrawResults = null;

    window.addEventListener('popstate', (e) => { if (isAtResults) handleBackAction(); });
    
    function handleBackAction() {
        if(confirm("Clear Match Data?")) { resetApp(false); } else { closeResults(); }
    }

    window.onload = () => {
        const saved = localStorage.getItem('matchpro_v800_save');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('numZones').value = data.z;
            document.getElementById('numTeams').value = data.t;
            document.getElementById('numIndivs').value = data.i;
            initGrid(true);
        }
        history.pushState({page: 'entry'}, 'Match Pro', '');
    };

    function saveState() {
        const data = {
            z: document.getElementById('numZones').value,
            t: document.getElementById('numTeams').value,
            i: document.getElementById('numIndivs').value,
            names: Array.from(document.querySelectorAll('.a-name, .t-name, .i-name')).map(el => el.value)
        };
        localStorage.setItem('matchpro_v800_save', JSON.stringify(data));
    }

    function resetApp(force) {
        if(force || confirm("Wipe all data?")) {
            localStorage.removeItem('matchpro_v800_save');
            location.reload();
        }
    }

    function initGrid(isAuto = false) {
        const nTeams = parseInt(document.getElementById('numTeams').value) || 0;
        const nIndivs = parseInt(document.getElementById('numIndivs').value) || 0;
        const container = document.getElementById('entryContainer');
        let savedNames = isAuto ? JSON.parse(localStorage.getItem('matchpro_v800_save')).names : [];
        container.innerHTML = ''; let idx = 0;

        for (let i = 1; i <= nTeams; i++) {
            const div = document.createElement('div'); div.className = 'team-block';
            div.innerHTML = `<div class="team-header"><span class="team-num">${i}</span><input type="text" class="t-name" placeholder="Team Name" value="${savedNames[idx++] || ""}" oninput="saveState()"></div>
                <div class="angler-grid">${[1,2,3,4].map(() => `<input type="text" class="a-name" placeholder="Angler" value="${savedNames[idx++] || ""}" oninput="saveState()">`).join('')}</div>`;
            container.appendChild(div);
        }
        if(nIndivs > 0) {
            const iDiv = document.createElement('div'); iDiv.className = 'team-block';
            iDiv.innerHTML = `<div class="team-header"><strong>Individuals</strong></div><div class="angler-grid" id="indivGrid"></div>`;
            container.appendChild(iDiv);
            const grid = iDiv.querySelector('#indivGrid');
            for(let j=0; j<nIndivs; j++) grid.innerHTML += `<input type="text" class="i-name" placeholder="Name" value="${savedNames[idx++] || ""}" oninput="saveState()">`;
        }
        document.getElementById('mainControls').style.display = 'flex';
    }

    function runDraw(isReshuffle = false) {
        const nZones = parseInt(document.getElementById('numZones').value) || 4;
        let teams = {}; let indivs = [];

        document.querySelectorAll('.team-block').forEach(block => {
            const tIn = block.querySelector('.t-name');
            if (tIn) {
                const teamName = tIn.value || "Unnamed Team";
                const names = Array.from(block.querySelectorAll('.a-name')).map(i => i.value.trim()).filter(v => v !== "");
                if (names.length) teams[teamName] = names.map(n => ({ name: n, team: teamName }));
            }
        });
        document.querySelectorAll('.i-name').forEach(input => { if (input.value.trim()) indivs.push({ name: input.value.trim(), team: 'Individual' }); });
        
        const currentAnglers = [].concat(...Object.values(teams), indivs);
        if (currentAnglers.length === 0) return alert("No names entered!");

        const baseSize = Math.floor(currentAnglers.length / nZones);
        const remainder = currentAnglers.length % nZones;
        let zoneMaps = [];
        let curPeg = 1;

        for(let i=0; i<nZones; i++) {
            let size = baseSize + (i < remainder ? 1 : 0);
            zoneMaps.push({ name: zones[i], start: curPeg, end: curPeg + size - 1, size: size, used: new Set() });
            curPeg += size;
        }

        // Processing Logic
        currentAnglers.forEach(a => {
            let zIdx = Math.floor(Math.random() * nZones);
            // In a real amendment we'd check lastDrawResults here, 
            // but for this v8 version we will flag any change if lastDraw exists.
            a.z1 = zIdx; a.p1 = getPeg(zoneMaps[zIdx]);
            a.z2 = (zIdx + 1) % nZones; a.p2 = getPeg(zoneMaps[a.z2]); 
        });

        // Delta Tracking
        if(lastDrawResults && !isReshuffle) {
            currentAnglers.forEach(a => {
                const prev = lastDrawResults.find(old => old.name === a.name);
                if(prev && (prev.p1 !== a.p1 || prev.z1 !== a.z1)) a.hasChanged = true;
            });
        }

        lastDrawResults = JSON.parse(JSON.stringify(currentAnglers));
        render(teams, indivs, zoneMaps);
        
        isAtResults = true; history.pushState({page: 'results'}, 'Results', '');
        document.getElementById('setupSection').style.display = 'none';
        document.getElementById('mainControls').style.display = 'none';
        document.getElementById('postDrawControls').style.display = 'flex';
    }

    function getPeg(z) {
        let p; do { p = Math.floor(Math.random() * z.size) + z.start; } while (z.used.has(p));
        z.used.add(p); return p;
    }

    function render(teams, indivs, maps) {
        let mapHtml = `<div class="beach-map">`;
        maps.forEach(m => mapHtml += `<div class="beach-zone row-${m.name.toLowerCase()}"><span class="beach-label">${m.name}</span><span class="beach-range">${m.start}-${m.end}</span></div>`);
        mapHtml += `</div>`;

        const makeTable = (data, title) => `
            <div class="res-block">
                <h3>${title}</h3>
                <table>
                    <thead><tr><th>Angler</th><th>Day 1</th><th>Day 2</th></tr></thead>
                    <tbody>${data.map(a => `<tr><td><strong>${a.name}</strong>${a.hasChanged ? '<span class="change-badge">CHANGED</span>' : ''}</td><td class="row-${zones[a.z1].toLowerCase()}">${zones[a.z1]} (${a.p1})</td><td class="row-${zones[a.z2].toLowerCase()}">${zones[a.z2]} (${a.p2})</td></tr>`).join('')}</tbody>
                </table>
            </div>`;

        let html = `<h2 style="text-align:center;">Beach Map Visualization</h2>` + mapHtml;
        Object.keys(teams).forEach(t => html += makeTable(teams[t], "Team: " + t));
        if(indivs.length) html += makeTable(indivs, "Individuals");
        document.getElementById('resultsArea').innerHTML = html;
        window.scrollTo(0, 0);
    }

    function closeResults() {
        isAtResults = false;
        document.getElementById('setupSection').style.display = 'block';
        document.getElementById('mainControls').style.display = 'flex';
        document.getElementById('postDrawControls').style.display = 'none';
        document.getElementById('resultsArea').innerHTML = '';
    }
</script>
</body>
</html>
