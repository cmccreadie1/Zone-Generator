<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MatchPro v7.7.0</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --subtext: #64748b;
            --accent: #0284c7; --border: #e2e8f0;
            --row-red: #ef4444; --row-yellow: #eab308; --row-green: #22c55e; --row-blue: #3b82f6;
        }
        
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; text-transform: uppercase; }
        input { text-transform: uppercase; font-weight: 900 !important; }

        .fixed-header { position: fixed; top: 0; left: 0; right: 0; z-index: 5000; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 12px 20px; }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto; }
        .app-logo { width: 100px; }
        .version-tag { font-weight: 900; font-size: 10px; color: var(--accent); padding: 4px 8px; border: 1px solid var(--accent); border-radius: 50px; }

        #entrySection, #resultsSection { max-width: 1000px; margin: 0 auto; padding: 140px 20px 40px; }
        #resultsSection { padding-top: 100px; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); margin-bottom: 24px; position: relative; }
        label { color: var(--subtext); font-weight: 800; font-size: 10px; margin-bottom: 8px; display: block; }
        
        input { background: #f1f5f9; border: 2px solid transparent; color: var(--text); padding: 14px; border-radius: 10px; width: 100%; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: var(--accent); background: #fff; }

        .btn-main { background: #0f172a; color: white; padding: 18px; border-radius: 12px; font-weight: 900; font-size: 14px; border: none; cursor: pointer; width: 100%; }
        
        .results-nav { background: var(--card); padding: 16px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn-nav { padding: 12px 2px; border-radius: 10px; font-size: 9px; font-weight: 900; border: none; cursor: pointer; color: white; }

        /* Split Ticket Result Layout */
        .angler-result-card { display: grid; grid-template-columns: 1fr 110px 110px; gap: 12px; align-items: center; background: #f8fafc; border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .res-name { font-size: 17px; font-weight: 900; color: #1e293b; }
        .res-team { font-size: 10px; color: var(--subtext); display: block; }
        
        .zone-visual { height: 75px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
        .zone-visual span { font-size: 9px; font-weight: 900; opacity: 0.9; margin-bottom: 2px; }
        .zone-visual b { font-size: 24px; font-weight: 900; }

        .btn-delete { position: absolute; top: 15px; right: 15px; background: #fee2e2; color: #ef4444; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: 900; }

        @media print { .no-print { display: none !important; } #resultsSection { padding-top: 0; } }
    </style>
</head>
<body>

<div class="fixed-header no-print">
    <div class="header-content">
        <div style="display:flex; align-items:center; gap:12px;">
            <img src="icon.svg" alt="Logo" class="app-logo">
            <span class="version-tag">v7.7.0</span>
        </div>
        <button style="background:transparent; border:none; font-weight:900; color:var(--subtext); font-size:11px; cursor:pointer;">HISTORY</button>
    </div>
</div>

<div id="entrySection" class="no-print">
    <div class="card">
        <div style="margin-bottom: 25px;"><label>MATCH TITLE</label><input type="text" id="matchTitle" placeholder="NAME OF COMP..."></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom:25px;">
            <div><label>TEAMS OF 4</label><input type="number" id="initTeams" value="24"></div>
            <div><label>SOLO ANGLERS</label><input type="number" id="initIndivs" value="4"></div>
        </div>
        <button class="btn-main" style="background:var(--accent);" onclick="bulkInit()">BUILD ENTRY LIST</button>
    </div>
    <div id="entryList" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap:20px;"></div>
    <div id="drawAction" style="display:none; margin-top:30px;"><button class="btn-main" onclick="runDraw()">PROCESS DUAL-DAY DRAW</button></div>
</div>

<div id="resultsSection" style="display:none;">
    <div class="results-nav no-print">
        <button onclick="window.print()" class="btn-nav" style="background:#64748b;">PRINT</button>
        <button onclick="exportToCSV()" class="btn-nav" style="background:#0ea5e9;">CSV EXPORT</button>
        <button onclick="exportToVault()" class="btn-nav" style="background:#16a34a;">VAULT (XLSX)</button>
        <button onclick="handleAmend()" class="btn-nav" style="background:#ea580c;">AMEND</button>
    </div>
    <div id="resultsArea"></div>
</div>

<script>
    const zones = ['RED', 'YELLOW', 'GREEN', 'BLUE'];
    const rotationMap = { 'RED': 'BLUE', 'BLUE': 'RED', 'YELLOW': 'GREEN', 'GREEN': 'YELLOW' };
    let currentDrawData = [];

    document.addEventListener('input', (e) => { if(e.target.tagName === 'INPUT') e.target.value = e.target.value.toUpperCase(); });

    function bulkInit() {
        const list = document.getElementById('entryList'); list.innerHTML = '';
        const t = parseInt(document.getElementById('initTeams').value) || 0;
        const i = parseInt(document.getElementById('initIndivs').value) || 0;
        for(let x=0; x<t; x++) addNewItem('TEAM');
        for(let y=0; y<i; y++) addNewItem('INDIV');
        document.getElementById('drawAction').style.display = 'block';
    }

    function addNewItem(type) {
        const list = document.getElementById('entryList');
        const div = document.createElement('div'); div.className = 'card'; div.dataset.type = type;
        const del = `<button class="btn-delete" tabindex="-1" onclick="this.parentElement.remove()">×</button>`;
        if(type === 'TEAM') {
            div.innerHTML = `${del}<label>TEAM NAME</label><input type="text" class="t-name" style="margin-bottom:12px;">` +
                [1,2,3,4].map(n => `<input type="text" class="a-name" placeholder="ANGLER ${n}" style="margin-bottom:8px;">`).join('');
        } else { div.innerHTML = `${del}<label>INDIVIDUAL</label><input type="text" class="a-name">`; }
        list.appendChild(div);
    }

    function shuffle(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } }

    function runDraw() {
        let teams = []; let indivs = [];
        document.querySelectorAll('.card[data-type]').forEach(block => {
            const names = Array.from(block.querySelectorAll('.a-name')).map(i => i.value.trim().toUpperCase()).filter(n => n);
            const tName = (block.querySelector('.t-name')?.value || "").trim().toUpperCase();
            if(block.dataset.type === 'TEAM' && names.length) teams.push({ tName, anglers: names });
            else if(names[0]) indivs.push({ name: names[0], team: "" });
        });

        const totalAnglers = (teams.length * 4) + indivs.length;
        const baseSize = Math.floor(totalAnglers / 4);
        const remainder = totalAnglers % 4;

        // Create Randomized Pools for Day 1 and Day 2
        let poolsD1 = zones.map((name, i) => {
            let size = baseSize + (i < remainder ? 1 : 0);
            let p = []; for(let n=1; n<=size; n++) p.push(n); shuffle(p);
            return { name, pool: p };
        });

        let poolsD2 = zones.map((name) => {
            // Find the Day 1 zone that rotates into this one
            const sourceZone = Object.keys(rotationMap).find(key => rotationMap[key] === name);
            const sourceIdx = zones.indexOf(sourceZone);
            let size = baseSize + (sourceIdx < remainder ? 1 : 0);
            let p = []; for(let n=1; n<=size; n++) p.push(n); shuffle(p);
            return { name, pool: p };
        });

        let results = [];
        teams.forEach(t => {
            let zIdx = [0,1,2,3]; shuffle(zIdx);
            let teamResults = { tName: t.tName, anglers: [] };
            t.anglers.forEach((name, i) => {
                const z1 = zones[zIdx[i]];
                const p1 = poolsD1[zIdx[i]].pool.pop();
                const z2 = rotationMap[z1];
                const z2Idx = zones.indexOf(z2);
                const p2 = poolsD2[z2Idx].pool.pop();
                teamResults.anglers.push({ name, team: t.tName, z1, p1, z2, p2 });
            });
            results.push(teamResults);
        });

        if(indivs.length) {
            let soloGroup = { tName: "INDIVIDUAL ANGLERS", anglers: [] };
            indivs.forEach(a => {
                let avail = poolsD1.map((p, idx) => idx).filter(idx => poolsD1[idx].pool.length > 0);
                const zIdx = avail[Math.floor(Math.random() * avail.length)];
                const z1 = zones[zIdx];
                const p1 = poolsD1[zIdx].pool.pop();
                const z2 = rotationMap[z1];
                const z2Idx = zones.indexOf(z2);
                const p2 = poolsD2[z2Idx].pool.pop();
                soloGroup.anglers.push({ name: a.name, team: "", z1, p1, z2, p2 });
            });
            results.push(soloGroup);
        }

        currentDrawData = results;
        renderResults(results);
        document.getElementById('entrySection').style.display = 'none';
        document.getElementById('resultsSection').style.display = 'block';
    }

    function renderResults(data) {
        const area = document.getElementById('resultsArea'); area.innerHTML = '';
        const matchTitle = document.getElementById('matchTitle').value || "MATCH DRAW RESULTS";
        area.innerHTML = `<div style="text-align:center; margin-bottom:40px;"><h1 style="font-weight:900;">${matchTitle}</h1></div>`;
        data.forEach(group => {
            let html = `<div class="card"><h3 style="margin:0 0 20px 0; color:var(--accent);">${group.tName || 'SOLO ANGLERS'}</h3>`;
            group.anglers.forEach(a => {
                html += `<div class="angler-result-card">
                    <div><span class="res-name">${a.name}</span><span class="res-team">${a.team || 'SOLO'}</span></div>
                    <div class="zone-visual" style="background:var(--row-${a.z1.toLowerCase()})"><span>DAY 1</span><b>${a.z1} (${a.p1})</b></div>
                    <div class="zone-visual" style="background:var(--row-${a.z2.toLowerCase()})"><span>DAY 2</span><b>${a.z2} (${a.p2})</b></div>
                </div>`;
            });
            area.innerHTML += html + `</div>`;
        });
    }

    function exportToCSV() {
        let csv = "ANGLER NAME,TEAM NAME,DAY 1 ZONE,DAY 2 ZONE\n";
        currentDrawData.forEach(group => {
            group.anglers.forEach(a => { csv += `${a.name},${a.team},${a.z1} (${a.p1}),${a.z2} (${a.p2})\n`; });
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `MATCH_DRAW_V770.csv`;
        link.click();
    }

    async function exportToVault() {
        const workbook = new ExcelJS.Workbook();
        try {
            const response = await fetch('COMPETITION_TEMPLATE.xlsx');
            if (!response.ok) throw new Error("Template not found.");
            const arrayBuffer = await response.arrayBuffer();
            await workbook.xlsx.load(arrayBuffer);
            const sheet = workbook.getWorksheet('DATA_IMPORT');
            
            sheet.getCell(1, 1).value = "ANGLER NAME";
            sheet.getCell(1, 2).value = "TEAM NAME";
            sheet.getCell(1, 3).value = "DAY 1 ZONE";
            sheet.getCell(1, 4).value = "DAY 2 ZONE";

            let rowIdx = 2;
            currentDrawData.forEach(group => {
                group.anglers.forEach(a => {
                    sheet.getCell(rowIdx, 1).value = a.name;
                    sheet.getCell(rowIdx, 2).value = a.team === "" ? null : a.team;
                    sheet.getCell(rowIdx, 3).value = `${a.z1} (${a.p1})`;
                    sheet.getCell(rowIdx, 4).value = `${a.z2} (${a.p2})`;
                    rowIdx++;
                });
            });
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Vault_Direct_v770.xlsx`;
            link.click();
        } catch (err) { alert(`VAULT ERROR: USE CSV EXPORT INSTEAD`); }
    }

    function handleAmend() { document.getElementById('entrySection').style.display = 'block'; document.getElementById('resultsSection').style.display = 'none'; }
</script>
</body>
</html>
