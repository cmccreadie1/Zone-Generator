<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zone Generator v9.0.1</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --accent: #38bdf8; --success: #10b981; --border: #334155;
            --warning: #f59e0b; --danger: #ef4444;
            --row-red: #fca5a5; --row-yellow: #fde047; --row-green: #86efac; --row-blue: #93c5fd;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 950px; margin: 0 auto; padding: 15px; }
        
        /* Fixed Navigation */
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; z-index: 3000; background: #1e293b; border-bottom: 2px solid var(--accent); padding: 12px 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        /* Spacing for content below fixed header */
        #entrySection { padding-top: 180px; }
        #resultsSection { padding-top: 100px; }

        #historyDrawer { position: fixed; right: -320px; top: 0; width: 320px; height: 100%; background: var(--card); border-left: 2px solid var(--accent); z-index: 4000; transition: 0.3s; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #historyDrawer.open { right: 0; }
        .history-item { background: var(--bg); padding: 12px; border-radius: 8px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        /* Setup & Entry Blocks */
        .setup-bar { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        input { background: var(--bg); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 16px; outline: none; }
        .entry-block { background: var(--card); border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); padding: 15px; position: relative; }
        .angler-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        
        /* Action Buttons */
        .action-bar { display: flex; gap: 10px; margin-top: 12px; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.1s active; }
        .btn-sm { padding: 14px; font-size: 13px; background: var(--bg); border: 1px dashed var(--accent); color: var(--accent); flex: 1; }
        .btn-draw-main { background: var(--success); color: white; padding: 14px; flex: 2; font-size: 15px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Results Control Bar (Amend/Share) */
        .results-nav-bar { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
        .nav-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-nav { padding: 16px; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-nav-share { background: var(--success); color: white; }
        .btn-nav-amend { background: var(--warning); color: #000; }

        /* Shoreline Visualization */
        .beach-map { display: flex; gap: 4px; margin-bottom: 20px; }
        .beach-zone { flex: 1; padding: 8px 2px; border-radius: 4px; text-align: center; color: #1e293b; font-size: 0.65rem; }
        .beach-zone b { display: block; font-size: 0.9rem; }

        /* PDF Export Styles */
        .res-block { background: white; color: #1e293b; border-radius: 8px; margin-bottom: 12px; padding: 12px; border: 1px solid #ddd; page-break-inside: avoid; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 8px; text-align: left; border-bottom: 1px solid #eee; font-size: 12px; }
        .draw-heading { color: #0f172a !important; text-align: center; margin: 0; text-transform: uppercase; font-size: 1.1rem; }
        .comp-name-sub { color: #0284c7 !important; font-weight: 700; display: block; font-size: 1.3rem; text-align: center; margin-bottom: 15px; }

        .row-red { background-color: var(--row-red) !important; }
        .row-yellow { background-color: var(--row-yellow) !important; }
        .row-green { background-color: var(--row-green) !important; }
        .row-blue { background-color: var(--row-blue) !important; }

        @media print { .no-print, .fixed-header, #historyDrawer { display: none !important; } #entrySection, #resultsSection { padding-top: 0; } }
    </style>
</head>
<body>

<div id="historyDrawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 style="margin:0; color:var(--accent);">Match Archive</h3>
        <button onclick="toggleHistory()" style="background:transparent; color:white; font-size:1.8rem;">×</button>
    </div>
    <div id="historyList"></div>
    <button onclick="fullReset()" style="width:100%; margin-top:20px; padding:12px; background:var(--danger); color:white;">Clear All History</button>
</div>

<div class="fixed-header no-print">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1 style="margin:0; font-size: 1.2rem; color:var(--accent); letter-spacing: 0.5px;">ZONE GENERATOR</h1>
        <button onclick="toggleHistory()" style="background:var(--accent); color:var(--bg); padding:6px 12px; border-radius:6px; font-size:11px;">HISTORY</button>
    </div>
    <div class="action-bar" id="topControls" style="display:none;">
        <button class="btn-sm" onclick="addNewItem('team')">+ TEAM</button>
        <button class="btn-sm" onclick="addNewItem('indiv')">+ INDIV</button>
        <button class="btn-draw-main" onclick="runDraw()">PROCESS DRAW</button>
    </div>
</div>

<div class="container">
    <div id="entrySection" class="no-print">
        <div class="setup-bar">
            <div style="margin-bottom: 15px;">
                <label style="font-size:10px; color:var(--accent)">MATCH NAME</label>
                <input type="text" id="matchTitle" placeholder="e.g. Scottish Shore Match">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <div><label style="font-size:10px; color:var(--accent)">ZONES</label><input type="number" id="numZones" value="4"></div>
                <div><label style="font-size:10px; color:var(--accent)">TEAMS</label><input type="number" id="initTeams" value="24"></div>
                <div><label style="font-size:10px; color:var(--accent)">INDIVS</label><input type="number" id="initIndivs" value="2"></div>
            </div>
            <button style="width:100%; background:var(--accent); color:var(--bg); padding:15px; margin-top:15px; border-radius:8px; font-weight:bold; font-size: 14px;" onclick="bulkInit()">INITIALIZE ANGLER LIST</button>
        </div>
        <div id="entryList"></div>
    </div>

    <div id="resultsSection" style="display: none;">
        <div class="results-nav-bar no-print">
            <div style="text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 8px;">
                <span id="displayTitle" style="font-weight:bold; color:var(--accent); font-size: 1.1rem;"></span>
            </div>
            <div class="nav-btn-group">
                <button onclick="sharePDF()" class="btn-nav btn-nav-share"><span>📄</span> SHARE PDF</button>
                <button onclick="showEntry()" class="btn-nav btn-nav-amend"><span>✏️</span> AMEND</button>
            </div>
        </div>
        
        <div id="resultsArea" style="background:white; padding:15px; border-radius:6px;"></div>
        
        <button class="btn-draw-main no-print" style="width:100%; margin-top:25px; padding:20px; font-size: 16px;" onclick="archiveCurrent()">SAVE & FINALIZE MATCH</button>
    </div>
</div>

<script>
    const zones = ['Red', 'Yellow', 'Green', 'Blue', 'Orange', 'Purple', 'Silver', 'Gold'];
    let lockedAssignments = new Map();
    let currentMatchID = null;

    function toggleHistory() {
        document.getElementById('historyDrawer').classList.toggle('open');
        renderHistoryList();
    }

    function renderHistoryList() {
        const list = document.getElementById('historyList');
        const archives = JSON.parse(localStorage.getItem('zonegen_v901_archive') || '[]');
        if(archives.length === 0) { list.innerHTML = "<p style='color:#64748b; font-size:0.8rem;'>No saved draws.</p>"; return; }
        list.innerHTML = archives.reverse().map((m, i) => `
            <div class="history-item">
                <div onclick="loadFromArchive('${m.id}')" style="flex:1; cursor:pointer;">
                    <div style="color:var(--accent); font-weight:bold;">${m.matchName}</div>
                    <div style="font-size:0.7rem; color:#94a3b8;">${m.timestamp}</div>
                </div>
                <div style="cursor:pointer; font-size:1.5rem;" onclick="loadFromArchive('${m.id}', true)">📄</div>
            </div>`).join('');
    }

    async function sharePDF() {
        const element = document.getElementById('resultsArea');
        const matchTitle = document.getElementById('matchTitle').value || 'MatchDraw';
        const opt = { margin: 10, filename: `${matchTitle}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };

        try {
            const pdfBlob = await html2pdf().set(opt).from(element).output('blob');
            const file = new File([pdfBlob], `${matchTitle}.pdf`, { type: 'application/pdf' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: 'Draw Results', text: `Results for: ${matchTitle}` });
            } else { html2pdf().set(opt).from(element).save(); }
        } catch (err) { alert("Sharing failed. Downloading instead."); html2pdf().set(opt).from(element).save(); }
    }

    function archiveCurrent() {
        const mTitle = document.getElementById('matchTitle').value || "Unnamed Match";
        const blocks = [];
        document.querySelectorAll('.entry-block').forEach(block => {
            const type = block.dataset.type;
            const tName = block.querySelector('.t-name')?.value || "";
            const names = Array.from(block.querySelectorAll('.a-name')).map(i => i.value);
            blocks.push({ type, tName, names });
        });
        const archiveData = { id: currentMatchID || Date.now().toString(), matchName: mTitle, timestamp: new Date().toLocaleString(), z: document.getElementById('numZones').value, blocks, locks: Object.fromEntries(lockedAssignments) };
        let archives = JSON.parse(localStorage.getItem('zonegen_v901_archive') || '[]');
        const existingIdx = archives.findIndex(a => a.id === archiveData.id);
        if (existingIdx > -1) archives[existingIdx] = archiveData; else archives.push(archiveData);
        localStorage.setItem('zonegen_v901_archive', JSON.stringify(archives));
        alert("Match Saved."); fullReset(true);
    }

    function loadFromArchive(id, andShare = false) {
        const archives = JSON.parse(localStorage.getItem('zonegen_v901_archive'));
        const data = archives.find(a => a.id === id);
        if (!data) return;
        currentMatchID = id; document.getElementById('matchTitle').value = data.matchName;
        document.getElementById('numZones').value = data.z;
        const list = document.getElementById('entryList'); list.innerHTML = '';
        data.blocks.forEach(b => addNewItem(b.type, b.tName, b.names));
        lockedAssignments = new Map(Object.entries(data.locks));
        if (document.getElementById('historyDrawer').classList.contains('open')) toggleHistory();
        runDraw();
        if (andShare) setTimeout(sharePDF, 500);
    }

    function bulkInit() {
        const list = document.getElementById('entryList'); list.innerHTML = '';
        const t = parseInt(document.getElementById('initTeams').value) || 0;
        const i = parseInt(document.getElementById('initIndivs').value) || 0;
        for(let x=0; x<t; x++) addNewItem('team'); for(let y=0; y<i; y++) addNewItem('indiv');
        document.getElementById('topControls').style.display = 'flex';
    }

    function addNewItem(type, tName = "", names = []) {
        const list = document.getElementById('entryList');
        const div = document.createElement('div'); div.className = 'entry-block'; div.dataset.type = type;
        const del = `<button onclick="this.parentElement.remove()" style="position:absolute;top:10px;right:10px;background:transparent;border:none;color:var(--danger);font-size:1.5rem;padding:5px;">×</button>`;
        if(type === 'team') {
            div.innerHTML = `${del}<input type="text" class="t-name" placeholder="Team Name" value="${tName}" style="margin-bottom:10px; border-bottom:1px solid var(--accent);">
                <div class="angler-grid">${[0,1,2,3].map(i => `<input type="text" class="a-name" placeholder="Angler" value="${names[i] || ""}">`).join('')}</div>`;
        } else {
            div.innerHTML = `${del}<input type="text" class="a-name" placeholder="Individual Name" value="${names[0] || ""}">`;
        }
        list.appendChild(div); document.getElementById('topControls').style.display = 'flex';
    }

    function runDraw() {
        const nZones = parseInt(document.getElementById('numZones').value) || 1;
        let teams = {}; let indivs = []; let all = [];
        document.querySelectorAll('.entry-block').forEach(block => {
            const names = Array.from(block.querySelectorAll('.a-name')).map(i => i.value.trim()).filter(n => n);
            const tName = block.querySelector('.t-name')?.value || "Team";
            if(block.dataset.type === 'team' && names.length) {
                teams[tName] = names.map(n => ({ name: n, team: tName })); all.push(...teams[tName]);
            } else if(names[0]) {
                const a = { name: names[0], team: 'Individual' }; indivs.push(a); all.push(a);
            }
        });
        if(!all.length) return alert("Please enter angler names.");
        const base = Math.floor(all.length / nZones); const rem = all.length % nZones;
        let map = []; let cur = 1;
        for(let i=0; i<nZones; i++) {
            let s = base + (i < rem ? 1 : 0);
            map.push({ name: zones[i], start: cur, end: cur+s-1, size: s, u1: new Set(), u2: new Set() }); cur += s;
        }
        all.forEach(a => {
            if(lockedAssignments.has(a.name)) {
                const p = lockedAssignments.get(a.name); a.z1 = p.z1; a.p1 = p.p1; a.z2 = p.z2; a.p2 = p.p2;
                if(map[a.z1]) map[a.z1].u1.add(a.p1); if(map[a.z2]) map[a.z2].u2.add(a.p2);
            }
        });
        all.forEach(a => {
            if(!lockedAssignments.has(a.name)) {
                const z = Math.floor(Math.random() * nZones); a.z1 = z; a.p1 = getPeg(map[z], 'u1');
                const z2 = (z + 1) % nZones; a.z2 = z2; a.p2 = getPeg(map[z2], 'u2');
                lockedAssignments.set(a.name, {z1: a.z1, p1: a.p1, z2: a.z2, p2: a.p2});
            }
        });
        renderResults(teams, indivs, map);
        document.getElementById('displayTitle').innerText = document.getElementById('matchTitle').value || "Current Match";
        document.getElementById('entrySection').style.display = 'none';
        document.getElementById('resultsSection').style.display = 'block';
    }

    function getPeg(z, k) {
        let p; let att = 0;
        do { p = Math.floor(Math.random() * z.size) + z.start; att++; } while (z[k].has(p) && att < 1500);
        z[k].add(p); return p;
    }

    function renderResults(teams, indivs, map) {
        let mHtml = `<div class="beach-map" style="display:flex; gap:5px; margin-bottom:20px;">` + 
            map.map(m => `<div class="beach-zone row-${m.name.toLowerCase()}"><b>${m.name}</b>${m.start}-${m.end}</div>`).join('') + `</div>`;
        const tbl = (data, title) => `<div class="res-block"><h3>${title}</h3><table><thead><tr><th>Angler</th><th>Day 1</th><th>Day 2</th></tr></thead><tbody>` + 
            data.map(a => `<tr><td><strong>${a.name}</strong></td><td class="row-${zones[a.z1].toLowerCase()}">${zones[a.z1]} (${a.p1})</td><td class="row-${zones[a.z2].toLowerCase()}">${zones[a.z2]} (${a.p2})</td></tr>`).join('') + `</tbody></table></div>`;
        let matchTitle = document.getElementById('matchTitle').value || 'Official Draw';
        let html = `<div style="text-align:center;"><h2 class="draw-heading">Official Draw Sheet</h2><span class="comp-name-sub">${matchTitle}</span></div>` + mHtml;
        Object.keys(teams).forEach(t => html += tbl(teams[t], "Team: " + t));
        if(indivs.length) html += tbl(indivs, "Individuals");
        document.getElementById('resultsArea').innerHTML = html;
        window.scrollTo(0,0);
    }

    function showEntry() { document.getElementById('entrySection').style.display = 'block'; document.getElementById('resultsSection').style.display = 'none'; }
    function fullReset(silent = false) {
        if(silent || confirm("Clear current workspace?")) {
            lockedAssignments.clear(); currentMatchID = null;
            document.getElementById('entryList').innerHTML = ''; document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('entrySection').style.display = 'block'; document.getElementById('matchTitle').value = '';
            document.getElementById('topControls').style.display = 'none';
        }
    }
</script>
</body>
</html>
