<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Pro v7.9.4</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --accent: #38bdf8; --success: #10b981; --border: #334155;
            --row-red: #fca5a5; --row-yellow: #fde047; --row-green: #86efac; --row-blue: #93c5fd;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; padding-bottom: 100px; }
        
        header { border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 25px; }
        .setup-bar { display: flex; gap: 15px; background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 25px; align-items: flex-end; border: 1px solid var(--border); }
        .input-group label { display: block; font-size: 11px; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
        input[type="number"], .main-input { background: var(--bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); background: #1e293b; }

        /* Team Entry Blocks (Always Visible) */
        .team-block { background: var(--card); border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); padding: 15px; }
        .team-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .team-num { background: var(--accent); color: var(--bg); padding: 2px 10px; border-radius: 4px; font-weight: bold; }
        .angler-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: 600; transition: 0.2s; }
        .btn-init { background: var(--accent); color: var(--bg); padding: 10px 20px; }
        .btn-draw { background: var(--success); color: white; padding: 18px; width: 100%; font-size: 1.2rem; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); max-width: 950px; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); z-index: 100; }
        .btn-print { background: #f59e0b; color: white; padding: 12px 24px; margin-bottom: 20px; }

        /* Result Colors */
        .res-block { background: white; color: #1e293b; border-radius: 8px; margin-bottom: 20px; padding: 15px; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 10px 8px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .row-red { background-color: var(--row-red) !important; }
        .row-yellow { background-color: var(--row-yellow) !important; }
        .row-green { background-color: var(--row-green) !important; }
        .row-blue { background-color: var(--row-blue) !important; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; color: black; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .res-block { page-break-inside: avoid; border: 1px solid #ddd; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="no-print">
        <h1>MATCH PRO <small style="font-size: 0.8rem; color: var(--accent);">v7.9.4</small></h1>
    </header>

    <div class="no-print">
        <div class="setup-bar">
            <div class="input-group"><label>Zones</label><input type="number" id="numZones" value="4"></div>
            <div class="input-group"><label>Teams</label><input type="number" id="numTeams" value="24"></div>
            <div class="input-group"><label>Individuals</label><input type="number" id="numIndivs" value="2"></div>
            <button class="btn-init" onclick="initGrid()">Initialize Grid</button>
        </div>

        <div id="entryContainer">
            </div>
        
        <button id="drawBtn" class="btn-draw" style="display:none" onclick="runDraw()">Process Competition Draw</button>
    </div>

    <div id="resultsArea"></div>
</div>

<script>
    const zones = ['Red', 'Yellow', 'Green', 'Blue', 'Orange', 'Purple', 'Silver', 'Gold'];

    function initGrid() {
        const nTeams = parseInt(document.getElementById('numTeams').value) || 0;
        const nIndivs = parseInt(document.getElementById('numIndivs').value) || 0;
        const container = document.getElementById('entryContainer');
        container.innerHTML = ''; 

        // Create Team Blocks
        for (let i = 1; i <= nTeams; i++) {
            const div = document.createElement('div');
            div.className = 'team-block';
            div.innerHTML = `
                <div class="team-header">
                    <span class="team-num">${i}</span>
                    <input type="text" class="main-input t-name" placeholder="Enter Team Name">
                </div>
                <div class="angler-grid">
                    <input type="text" class="main-input a-name" placeholder="Angler 1">
                    <input type="text" class="main-input a-name" placeholder="Angler 2">
                    <input type="text" class="main-input a-name" placeholder="Angler 3">
                    <input type="text" class="main-input a-name" placeholder="Angler 4">
                </div>
            `;
            container.appendChild(div);
        }

        // Create Individual Block
        if(nIndivs > 0) {
            const iDiv = document.createElement('div');
            iDiv.className = 'team-block';
            iDiv.innerHTML = `
                <div class="team-header"><strong>Individual Anglers</strong></div>
                <div class="angler-grid" id="indivGrid"></div>
            `;
            container.appendChild(iDiv);
            const grid = iDiv.querySelector('#indivGrid');
            for(let j=0; j<nIndivs; j++) {
                grid.innerHTML += `<input type="text" class="main-input i-name" placeholder="Angler Name">`;
            }
        }

        document.getElementById('drawBtn').style.display = 'block';
    }

    function runDraw() {
        const nZones = parseInt(document.getElementById('numZones').value) || 4;
        let teams = {}; let indivs = [];

        document.querySelectorAll('.team-block').forEach(block => {
            const tIn = block.querySelector('.t-name');
            if (tIn) {
                const teamName = tIn.value || "Unnamed Team";
                const names = Array.from(block.querySelectorAll('.a-name')).map(i => i.value.trim()).filter(v => v !== "");
                if (names.length) teams[teamName] = names.map(n => ({ name: n, team: teamName }));
            }
        });

        document.querySelectorAll('.i-name').forEach(input => {
            if (input.value.trim()) indivs.push({ name: input.value.trim(), team: 'Individual' });
        });

        const totalAnglers = [].concat(...Object.values(teams), indivs);
        if (totalAnglers.length === 0) return alert("Please enter at least one angler name.");

        const cap = Math.ceil(totalAnglers.length / nZones);
        let u1 = new Set(), u2 = new Set();

        Object.keys(teams).forEach(t => {
            let zs = [...Array(nZones).keys()].sort(() => Math.random() - 0.5);
            teams[t].forEach((a, i) => {
                const z = zs[i % nZones];
                a.z1 = z; a.p1 = getP(z, cap, u1);
                a.z2 = (z + 1) % nZones; a.p2 = getP(a.z2, cap, u2);
            });
        });

        indivs.forEach(a => {
            const z = Math.floor(Math.random() * nZones);
            a.z1 = z; a.p1 = getP(z, cap, u1);
            a.z2 = (z + 1) % nZones; a.p2 = getP(a.z2, cap, u2);
        });

        render(teams, indivs);
    }

    function getP(z, s, u) {
        let p, att = 0;
        do { p = (z * s) + Math.floor(Math.random() * s) + 1; att++; } 
        while (u.has(p) && att < 2000);
        u.add(p); return p;
    }

    function render(teams, indivs) {
        let html = `<button class="btn-print no-print" onclick="window.print()">Print Hard Copy</button>`;
        const makeTable = (data, title) => `
            <div class="res-block">
                <h3 style="margin:0 0 10px 0;">${title}</h3>
                <table>
                    <thead><tr><th>Angler</th><th>Day 1</th><th>Day 2</th></tr></thead>
                    <tbody>${data.map(a => `
                        <tr>
                            <td><strong>${a.name}</strong></td>
                            <td class="row-${zones[a.z1].toLowerCase()}">${zones[a.z1]} - Peg ${a.p1}</td>
                            <td class="row-${zones[a.z2].toLowerCase()}">${zones[a.z2]} - Peg ${a.p2}</td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            </div>`;

        Object.keys(teams).forEach(t => html += makeTable(teams[t], "Team: " + t));
        if(indivs.length) html += makeTable(indivs, "Individual Anglers");
        document.getElementById('resultsArea').innerHTML = html;
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>
</body>
</html>
