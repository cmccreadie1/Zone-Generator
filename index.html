<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishing Match Manager v7.6.1</title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --success: #27ae60;
            --light: #f8f9fa; --border: #dcdde1;
        }
        body { font-family: -apple-system, sans-serif; background: #edf2f7; color: var(--primary); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Setup UI */
        .setup-box { background: var(--light); padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .setup-box label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        .setup-box input { width: 80%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; }
        
        .grid-container { overflow-x: auto; margin-bottom: 20px; max-height: 500px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; position: sticky; top: 0; }
        
        .controls { margin: 20px 0; display: flex; gap: 10px; }
        button { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-setup { background: var(--accent); color: white; }
        .btn-draw { background: var(--success); color: white; flex-grow: 1; font-size: 1.1rem; }
        .btn-print { background: #e67e22; color: white; font-size: 1.1rem; }

        /* Print Styles - This is what creates your hard copy */
        @media print {
            .no-print, .setup-box, .grid-container, .controls, button { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; width: 100%; max-width: 100%; }
            table { font-size: 12px; }
            th { background: #eee !important; color: black !important; }
            tr { page-break-inside: avoid; }
            .print-only { display: block !important; }
        }
        .print-only { display: none; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="print-only">
        <h1>Official Match Draw Sheet</h1>
        <p id="printTimestamp"></p>
    </div>

    <header class="no-print">
        <h1>Match Manager v7.6.1</h1>
        <p>Define setup -> Enter names -> Generate -> Print Hard Copy</p>
    </header>

    <div class="no-print">
        <div class="setup-box">
            <div><label>Zones</label><input type="number" id="numZones" value="4"></div>
            <div><label>Teams</label><input type="number" id="numTeams" value="24"></div>
            <div><label>Individuals</label><input type="number" id="numIndivs" value="2"></div>
            <div style="display:flex; align-items:flex-end;"><button class="btn-setup" onclick="initializeGrid()">Create Table</button></div>
        </div>

        <div class="grid-container" id="gridWrapper" style="display:none;">
            <table>
                <thead><tr><th>#</th><th>Team Name</th><th>Angler Name</th></tr></thead>
                <tbody id="entryBody"></tbody>
            </table>
        </div>

        <div class="controls" id="drawControls" style="display:none;">
            <button class="btn-draw" onclick="processDraw()">GENERATE DRAW</button>
            <button class="btn-print" id="printBtn" style="display:none;" onclick="printHardCopy()">PRINT HARD COPY</button>
        </div>
    </div>

    <div id="resultsArea"></div>
</div>

<script>
    const zoneNames = ['Red', 'Yellow', 'Green', 'Blue', 'Orange', 'Purple'];

    function initializeGrid() {
        const nTeams = parseInt(document.getElementById('numTeams').value);
        const nIndivs = parseInt(document.getElementById('numIndivs').value);
        const body = document.getElementById('entryBody');
        body.innerHTML = '';

        for (let t = 1; t <= nTeams; t++) {
            for (let m = 1; m <= 4; m++) {
                body.innerHTML += `<tr><td>${body.rows.length+1}</td><td><input type="text" value="Team ${t}" class="t-name"></td><td><input type="text" class="a-name" placeholder="Name"></td></tr>`;
            }
        }
        for (let i = 1; i <= nIndivs; i++) {
            body.innerHTML += `<tr style="background:#f9f9f9"><td>${body.rows.length+1}</td><td><input type="text" value="INDIVIDUAL" disabled></td><td><input type="text" class="a-name" placeholder="Name"></td></tr>`;
        }
        document.getElementById('gridWrapper').style.display = 'block';
        document.getElementById('drawControls').style.display = 'flex';
    }

    function processDraw() {
        const nZones = parseInt(document.getElementById('numZones').value);
        const anglers = [];
        document.querySelectorAll('#entryBody tr').forEach(row => {
            const name = row.querySelector('.a-name').value;
            if(name) anglers.push({ name, team: row.querySelector('.t-name').value });
        });

        if(anglers.length === 0) return alert("Enter names first!");

        const zoneSize = Math.ceil(anglers.length / nZones);
        let usedD1 = new Set(), usedD2 = new Set();

        // Assign Day 1 & Day 2 (Basic Rotation Logic)
        anglers.forEach((a, i) => {
            a.d1z = i % nZones;
            a.d1p = getPeg(a.d1z, zoneSize, usedD1);
            a.d2z = (a.d1z + 1) % nZones;
            a.d2p = getPeg(a.d2z, zoneSize, usedD2);
        });

        renderResults(anglers);
        document.getElementById('printBtn').style.display = 'block';
    }

    function getPeg(z, size, used) {
        let p;
        do { p = (z * size) + Math.floor(Math.random() * size) + 1; } while(used.has(p));
        used.add(p); return p;
    }

    function renderResults(anglers) {
        let html = `<table><thead><tr><th>Angler</th><th>Team</th><th>Day 1</th><th>Day 2</th></tr></thead><tbody>`;
        anglers.sort((a,b) => a.d1p - b.d1p).forEach(a => {
            html += `<tr><td><strong>${a.name}</strong></td><td>${a.team}</td><td>${zoneNames[a.d1z]} Peg ${a.d1p}</td><td>${zoneNames[a.d2z]} Peg ${a.d2p}</td></tr>`;
        });
        document.getElementById('resultsArea').innerHTML = html + `</tbody></table>`;
    }

    function printHardCopy() {
        document.getElementById('printTimestamp').innerText = "Generated on: " + new Date().toLocaleString();
        window.print();
    }
</script>
</body>
</html>
