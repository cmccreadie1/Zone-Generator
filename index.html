<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Pro v7.9.1</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --accent: #38bdf8; --success: #10b981; --border: #334155;
            /* Zone Colors */
            --z-red: #fee2e2; --z-yellow: #fef9c3; --z-green: #dcfce7; --z-blue: #dbeafe;
            --z-orange: #ffedd5; --z-purple: #f3e8ff;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .setup-bar { display: flex; gap: 15px; background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 30px; align-items: flex-end; border: 1px solid var(--border); }
        .input-group label { display: block; font-size: 11px; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
        input[type="number"], .main-input { background: var(--bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        
        /* Expandable Cards */
        .team-card { background: var(--card); border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); overflow: hidden; }
        .card-header { padding: 15px; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .card-body { max-height: 0; padding: 0 15px; transition: all 0.3s ease-out; opacity: 0; pointer-events: none; }
        .team-card.open .card-body { max-height: 300px; padding: 15px; opacity: 1; border-top: 1px solid var(--border); pointer-events: auto; }
        .angler-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: 600; }
        .btn-init { background: var(--accent); color: var(--bg); padding: 10px 20px; }
        .btn-draw { background: var(--success); color: white; padding: 15px; width: 100%; font-size: 1.1rem; margin-top: 20px; }
        .btn-print { background: #f59e0b; color: white; padding: 12px 24px; margin-bottom: 20px; }

        /* Results Display with Color Coding */
        .res-block { background: white; color: #1e293b; border-radius: 8px; margin-bottom: 20px; padding: 15px; overflow: hidden; }
        .res-block h3 { margin: 0 0 10px 0; font-size: 1.2rem; border-bottom: 2px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.8rem; color: #64748b; padding: 8px; }
        td { padding: 10px 8px; font-weight: 500; border-bottom: 1px solid rgba(0,0,0,0.05); }

        /* Row Color Classes */
        .row-red { background-color: #fca5a5 !important; }
        .row-yellow { background-color: #fde047 !important; }
        .row-green { background-color: #86efac !important; }
        .row-blue { background-color: #93c5fd !important; }
        .row-orange { background-color: #fdba74 !important; }
        .row-purple { background-color: #d8b4fe !important; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; color: black; padding: 0; }
            .container { max-width: 100%; }
            .res-block { border: 1px solid #ccc; page-break-inside: avoid; }
            /* Forces background colors to print */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="no-print">
        <div>
            <h1 style="margin:0;">MATCH PRO</h1>
            <small style="color: var(--accent)">Competition Engine v7.9.1</small>
        </div>
        <div id="status">Ready</div>
    </header>

    <div class="no-print">
        <div class="setup-bar">
            <div class="input-group"><label>Zones</label><input type="number" id="numZones" value="4"></div>
            <div class="input-group"><label>Teams</label><input type="number" id="numTeams" value="24"></div>
            <div class="input-group"><label>Individuals</label><input type="number" id="numIndivs" value="2"></div>
            <button class="btn-init" onclick="initGrid()">Initialize</button>
        </div>
        <div id="entryContainer"></div>
        <button id="drawBtn" class="btn-draw" style="display:none" onclick="runDraw()">Process Draw</button>
    </div>

    <div id="resultsArea"></div>
</div>

<script>
    const zones = ['Red', 'Yellow', 'Green', 'Blue', 'Orange', 'Purple'];

    function initGrid() {
        const nTeams = parseInt(document.getElementById('numTeams').value);
        const nIndivs = parseInt(document.getElementById('numIndivs').value);
        const container = document.getElementById('entryContainer');
        container.innerHTML = '';

        for (let i = 1; i <= nTeams; i++) {
            const card = document.createElement('div');
            card.className = 'team-card';
            card.innerHTML = `
                <div class="card-header" onclick="toggleCard(this)">
                    <div style="background:var(--accent);color:var(--bg);padding:2px 8px;border-radius:4px;font-weight:bold;">${i}</div>
                    <input type="text" class="main-input t-name" placeholder="Team Name..." onclick="event.stopPropagation()">
                </div>
                <div class="card-body">
                    <div class="angler-grid">
                        <input type="text" class="main-input a-name" placeholder="Angler 1">
                        <input type="text" class="main-input a-name" placeholder="Angler 2">
                        <input type="text" class="main-input a-name" placeholder="Angler 3">
                        <input type="text" class="main-input a-name" placeholder="Angler 4">
                    </div>
                </div>`;
            container.appendChild(card);
        }

        if(nIndivs > 0) {
            const iCard = document.createElement('div');
            iCard.className = 'team-card open';
            iCard.innerHTML = `<div class="card-header"><strong>Individual
